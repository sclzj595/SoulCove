# ============================================================
# SoulCove 全局配置文件
# 通过 ConfigManager 单例统一读写，支持运行时动态修改
# ============================================================

[Display]
# 行号显示开关
showLineNumbers=true
# 编辑器字体大小
fontSize=14
# 主题: dark(暗黑) / light(浅色)
theme=dark

[Editor]
# 自动保存开关
autoSave=false
# 智能补全开关
showCompletion=true
# 补全最小触发前缀长度
minPrefixLen=2

[Window]
# 窗口位置大小（Base64编码的QByteArray，程序自动管理）
geometry=
# 启动时窗口宽度
width=900
# 启动时窗口高度
height=650
# 是否最大化
maximized=false

[Encoding]
# 默认编码格式
defaultEncoding=UTF-8
